name: Meroshare IPO Automation

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * *"  # Runs daily at 6:00 AM UTC (11:45 AM NPT)
  workflow_dispatch:

jobs:
  cypress-run:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      matrix:
        member_index: [0, 1, 2, 3]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment for Member ${{ matrix.member_index }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KITTA: ${{ secrets.KITTA }}
          MAX_IPO_PRICE: ${{ secrets.MAX_IPO_PRICE }}
          MEMBERS_INFO: ${{ secrets.MEMBERS_INFO }}
        run: |
          echo "TELEGRAM_TOKEN=\"$TELEGRAM_TOKEN\"" > .env
          echo "TELEGRAM_CHAT_ID=\"$TELEGRAM_CHAT_ID\"" >> .env
          echo "KITTA=$KITTA" >> .env
          echo "MAX_IPO_PRICE=$MAX_IPO_PRICE" >> .env

          SINGLE_MEMBER=$(echo "$MEMBERS_INFO" | jq -c "[.[${{ matrix.member_index }}]]")
          echo "MEMBERS_INFO='$SINGLE_MEMBER'" >> .env

          MEMBER_NAME=$(echo "$MEMBERS_INFO" | jq -r ".[${{ matrix.member_index }}].name")
          echo "MEMBER_NAME=$MEMBER_NAME" >> $GITHUB_ENV
          echo "Environment configured for $MEMBER_NAME"

      - name: Cypress run for ${{ env.MEMBER_NAME }}
        id: cypress
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
        continue-on-error: true

      - name: Notify IPO Application Status
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          send_telegram() {
            local msg="$1"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"${msg}\"}"
          }

          RESULT_FILE="cypress/results/${{ env.MEMBER_NAME }}-result.json"

          if [ -f "$RESULT_FILE" ]; then
            STATUS=$(jq -r '.status' "$RESULT_FILE")

            if [ "$STATUS" = "applied" ]; then
              COMPANY=$(jq -r '.appliedIPOs[0].company' "$RESULT_FILE")
              SCRIP=$(jq -r '.appliedIPOs[0].scrip' "$RESULT_FILE")
              MSG=$(printf "IPO Applied - ${{ env.MEMBER_NAME }}\n\nShare: %s (%s)\nStatus: Successfully Applied" "$COMPANY" "$SCRIP")
              send_telegram "$MSG"

            elif [ "$STATUS" = "failed" ]; then
              COMPANY=$(jq -r '.appliedIPOs[0].company' "$RESULT_FILE")
              ERR=$(jq -r '.appliedIPOs[0].message' "$RESULT_FILE")
              MSG=$(printf "Application Failed - ${{ env.MEMBER_NAME }}\n\nShare: %s\nError: %s" "$COMPANY" "$ERR")
              send_telegram "$MSG"

            else
              echo "Status: $STATUS - no notification needed"
            fi

          elif [ "${{ steps.cypress.outcome }}" = "failure" ]; then
            MSG=$(printf "Login Failed - ${{ env.MEMBER_NAME }}\n\nPlease check credentials in GitHub Secrets (MEMBERS_INFO)")
            send_telegram "$MSG"
          fi
